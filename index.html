<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Check-In Form</title>
    <style>
        html, body {
        margin: 0;
        padding: 0;
        }

        body { 
        font-family: Arial, sans-serif; 
        text-align: center; 
        }

        .content {
        padding: 20px;
        }

        /* 9.13.2：确保上方文字区域可选中（复制） */
        #topText {
        user-select: text;
        }
        
        /* 1) 缩小标题与下一行文字的间距 */
        h3 { 
        margin: 0 0 8px;
        line-height: 1.2;
        }
        
        /* 2) 给标题下那行说明文字一个可控的段落样式 */
        .subtitle {
        margin: 0 0 12px;
        color: #333;
        line-height: 1.4;
        }
        
        .form-container { margin: 1px 0 30px; }

        .form-container iframe {
        display: block;
        width: 100%;
        border: none;
        max-width: 100%;
        }
        
        /* 3) event-info 整体间距可再紧一点 */
        .event-info { 
        margin: 12px 0; 
        color: #333; 
        font-size: 20px; 
        line-height: 1.2;
        }
        
        /* 4) 关键：把 p 的默认上下 margin 压小 */
        .event-info p {
        margin: 1px 0;
        }

        /* ✅ 复制按钮布局 */
        .copy-row {
        display: flex;
        gap: 8px;
        justify-content: center;
        align-items: stretch;
        margin: 4px 0;
        }

        .copy-input {
        width: 100%;
        max-width: 420px;
        font-size: 18px;
        padding: 8px;
        text-align: center;
        box-sizing: border-box;
        }

        .copy-btn {
        padding: 8px 12px;
        font-size: 14px;
        border: 1px solid #c9c9c9;
        background: #ffffff;
        border-radius: 6px;
        cursor: pointer;
        white-space: nowrap;
        }

        .copy-btn:hover {
        background: #f2f2f2;
        }

        .copy-btn:active {
        transform: translateY(1px);
        }
        
        .redirect-btn {
        display: inline-block; margin-top: 20px; padding: 15px 30px;
        background-color: #0078d4; color: white; text-decoration: none; border-radius: 5px;
        font-size: 18px; font-weight: 500;
        }
        .redirect-btn:hover { background-color: #005a9e; }
        
        .tip { color: #666; margin-top: 30px; font-size: 14px; line-height: 1.5; }

        /* ✅ Toast (Copy success) */
        #toast {
        position: fixed;
        left: 50%;
        bottom: 24px;
        transform: translateX(-50%);
        background: rgba(17, 24, 39, 0.92);
        color: #fff;
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 14px;
        line-height: 1.2;
        box-shadow: 0 10px 25px rgba(0,0,0,.18);
        opacity: 0;
        pointer-events: none;
        transition: opacity .18s ease, transform .18s ease;
        z-index: 9999;
        }

        #toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(-6px);
        }

        /* ✅ 父页面滚动锁（iOS 更稳：position: fixed + top 偏移保存滚动位置） */
        body.lock-scroll {
        position: fixed;
        overflow: hidden;
        width: 100%;
        }
    </style>
</head>
<body>
    <div class="content" id="topText">
        <!--<h3>Please complete the form below</h3>
        <p class="subtitle">The information you submit is used only for event audience check-in.</p>-->
        
        <div class="event-info">
            <p><strong>Event Code:</strong></p>
            <div class="copy-row">
                <input id="eventCodeInput" value="0001" readonly onclick="this.select()" aria-label="Event Code" class="copy-input">
                <button type="button" class="copy-btn" data-copy-target="eventCodeInput">Copy</button>
            </div>

            <p><strong>URL for M365 Copilot:</strong></p>
            <div class="copy-row">
                <input id="urlInput" value="m365.cloud.microsoft" readonly onclick="this.select()" aria-label="URL for M365 Copilot" class="copy-input">
                <button type="button" class="copy-btn" data-copy-target="urlInput">Copy</button>
            </div>
        </div>

        <p>Please scroll down after submitting.</p>
    </div>

    <!-- 已嵌入MS Form链接 -->
    <div class="form-container">
        <iframe id="msFormFrame" width="100%" height="600px" 
                src="https://forms.office.com/r/mKG0Lu64FY?origin=lprLink" 
                frameborder="0" marginwidth="0" marginheight="0" 
                style="border: none; max-width:100%;" allowfullscreen>
        </iframe>
    </div>

    <div class="content">
        <p>Once you have submitted the form, please click the button below to access your exclusive AI tips and resources.</p>
        <!-- 已嵌入Notion跳转链接 -->
        <a href="https://www.notion.so/317bd47a65e78036b450ef55595df79e?source=copy_link" target="_blank" class="redirect-btn">
            Access AI Tips and Resources
        </a>

        <p class="tip">If the form fails to load, please visit the original form link: <a href="https://forms.office.com/r/mKG0Lu64FY?origin=lprLink" target="_blank">Click here</a></p>
    </div>

    <!-- ✅ Toast 容器 -->
    <div id="toast" aria-live="polite" aria-atomic="true"></div>

    <script>
    (function () {
      const top = document.getElementById('topText');
      if (!top) return;

      const frame = document.getElementById('msFormFrame');

      function isSelectingText() {
        const sel = window.getSelection && window.getSelection();
        return sel && sel.type === 'Range' && String(sel).length > 0;
      }

      // 桌面：鼠标滚轮（不影响拖选复制）
      top.addEventListener('wheel', function (e) {
        e.preventDefault();
      }, { passive: false });

      // 手机：只在“未进行文字选择”时阻止滚动（不影响复制选区手柄）
      top.addEventListener('touchmove', function (e) {
        if (isSelectingText()) return;
        e.preventDefault();
      }, { passive: false });

      /* ✅ Toast 工具函数 */
      let toastTimer = null;
      function showToast(message) {
        const toast = document.getElementById('toast');
        if (!toast) return;
        toast.textContent = message;
        toast.classList.add('show');

        if (toastTimer) clearTimeout(toastTimer);
       customize-app/form-submit-redirection)
         execCommand 已不推荐，但可作为兼容兜底。[8](https://profile-sh.github.io/docs/projects/gh_pages.html) */
      async function copyFromInput(inputId, buttonEl) {
        const input = document.getElementById(inputId);
        if (!input) return;

        const text = input.value;

        try {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(text);
          } else {
            input.focus();
            input.select();
            input.setSelectionRange(0, text.length);
            const ok = document.execCommand('copy');
            if (!ok) throw new Error('execCommand copy failed');
          }

          const old = buttonEl.textContent;
          buttonEl.textContent = 'Copied';
          setTimeout(() => { buttonEl.textContent = old; }, 1200);

          showToast('✅ Copied to clipboard!');
        } catch (err) {
          const old = buttonEl.textContent;
          buttonEl.textContent = 'Copy failed';
          setTimeout(() => { buttonEl.textContent = old; }, 1500);
        }
      }

      const copyButtons = document.querySelectorAll('button[data-copy-target]');
      copyButtons.forEach(btn => {
        btn.addEventListener('click', function () {
          copyFromInput(btn.getAttribute('data-copy-target'), btn);
        });
      });

      /* =========================================================
         ✅ 关键修复：iOS 键盘多次弹出后仍会“推父页面”的问题
         - 使用 VisualViewport.height + offsetTop 双信号判断键盘状态
         - 用 maxVVH（历史最大 height）做基准，避免基准被“越变越小”
         - 针对 offsetTop 不归零的 Safari bug 增加微小 scrollBy 纠正
         VisualViewport 的 height/offsetTop 属于标准接口属性。[1](https://developer.mozilla.org/en-US/docs/Web/API/VisualViewport)
         offsetTop 在键盘相关场景会变化且可能出现不复位 bug，实践中需 workaround。[3](https://iifx.dev/en/articles/460201403/debugging-ios-26-how-to-correct-fixed-positioning-post-keyboard-interaction)[4](https://developer.apple.com/forums/thread/800154)
      ========================================================= */

      let savedScrollY = 0;
      let locked = false;

      function lockBodyScroll() {
        if (locked) return;
        savedScrollY = window.scrollY || document.documentElement.scrollTop || 0;
        document.body.classList.add('lock-scroll');
        document.body.style.top = `-${savedScrollY}px`;
        locked = true;
      }

      function unlockBodyScroll() {
        if (!locked) return;
        document.body.classList.remove('lock-scroll');
        document.body.style.top = '';
        window.scrollTo(0, savedScrollY);
        locked = false;
      }

      // “正在表单交互”状态：无法拿到 iframe 内 focus，只能靠用户点到 iframe 作为近似。
      let inFormInteraction = false;
      let interactionTimer = null;
      function markInFormInteraction() {
        inFormInteraction = true;
        if (interactionTimer) clearTimeout(interactionTimer);
        interactionTimer = setTimeout(() => { inFormInteraction = false; }, 8000);
      }

      if (frame) {
        frame.addEventListener('pointerdown', () => { markInFormInteraction(); lockBodyScroll(); }, { passive: true });
        frame.addEventListener('touchstart',  () => { markInFormInteraction(); lockBodyScroll(); }, { passive: true });
      }

      // VisualViewport：用 maxVVH 做基准更稳（避免第二次阈值失效）
      let maxVVH = null;
      let keyboardLikelyOpen = false;
      let lastOffsetTop = 0;

      function updateMaxVVH(vv) {
        if (!vv) return;
        if (maxVVH == null) maxVVH = vv.height;
        maxVVH = Math.max(maxVVH, vv.height);
      }

      function vvIndicatesKeyboard(vv) {
        if (!vv) return false;

        updateMaxVVH(vv);

        const heightDelta = maxVVH - vv.height;    // 键盘出现通常会让 visual viewport 变矮 [1](https://developer.mozilla.org/en-US/docs/Web/API/VisualViewport)
        const offset = vv.offsetTop || 0;          // 键盘/聚焦时 offsetTop 往往变化 [1](https://developer.mozilla.org/en-US/docs/Web/API/VisualViewport)[5](https://stackoverflow.com/questions/43833049/how-to-make-fixed-content-go-above-ios-keyboard)

        // 经验阈值：iOS/Android 都适用，iOS 有时 heightDelta 不够大，但 offsetTop 会明显变化
        const byHeight = heightDelta > 90;
        const byOffset = offset > 40;

        return byHeight || byOffset;
      }

      function tryFixOffsetTopStuck(vv) {
        if (!vv) return;
        // 某些 iOS 版本会出现 offsetTop 收起键盘后不归零的问题，需要轻微滚动触发重算 [3](https://iifx.dev/en/articles/460201403/debugging-ios-26-how-to-correct-fixed-positioning-post-keyboard-interaction)[4](https://developer.apple.com/forums/thread/800154)
        if (!keyboardLikelyOpen && vv.offsetTop && vv.offsetTop > 0) {
          window.scrollBy(0, -1);
          window.scrollBy(0, 1);
        }
      }

      if (window.visualViewport) {
        const vv = window.visualViewport;

        updateMaxVVH(vv);
        lastOffsetTop = vv.offsetTop || 0;

        const onVVChange = () => {
          // 每次变化都更新 maxVVH（只增不减）
          updateMaxVVH(vv);

          // 只在“正在和表单交互”或“已经判定键盘开着”时进行强干预，避免误伤普通滚动
          const shouldAct = inFormInteraction || keyboardLikelyOpen;

          const nowKeyboard = vvIndicatesKeyboard(vv);

          if (shouldAct && nowKeyboard) {
            keyboardLikelyOpen = true;
            lockBodyScroll();
          } else if (keyboardLikelyOpen && !nowKeyboard) {
            // 键盘收起：解锁并修复可能残留的 offsetTop
            keyboardLikelyOpen = false;
            unlockBodyScroll();
            setTimeout(() => tryFixOffsetTopStuck(vv), 50);
          }

          // 记录 offsetTop 变化（辅助排查）
          lastOffsetTop = vv.offsetTop || 0;
        };

        vv.addEventListener('resize', onVVChange);
        vv.addEventListener('scroll', onVVChange);

        // 方向变化：重新建立 maxVVH（否则阈值会错）
        window.addEventListener('orientationchange', () => {
          setTimeout(() => {
            unlockBodyScroll();
            keyboardLikelyOpen = false;
            inFormInteraction = false;
            maxVVH = vv.height; // 旋转后以当前作为新的“最大可视高度”起点
          }, 350);
        });
      }

      // 点击 iframe 外部：若键盘不在，允许解锁（避免锁死）
      document.addEventListener('pointerdown', (e) => {
        if (!frame) return;
        if (!frame.contains(e.target) && !keyboardLikelyOpen) {
          unlockBodyScroll();
        }
      }, { passive: true });

    })();
    </script>
</body>
</html>
