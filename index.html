<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Check-In Form</title>
    <style>
        html, body {
        margin: 0;
        padding: 0;
        }

        body { 
        font-family: Arial, sans-serif; 
        text-align: center; 
        }

        .content {
        padding: 20px;
        }

        /* 确保文字区域可选中（复制） */
        #topText {
        user-select: text;
        padding-bottom: 0;
        }

        /* 1) 缩小标题与下一行文字的间距 */
        h3 { 
        margin: 0 0 8px;
        line-height: 1.2;
        }

        /* 2) 给标题下那行说明文字一个可控的段落样式 */
        .subtitle {
        margin: 0 0 12px;
        color: #333;
        line-height: 1.4;
        }

        /* ✅ 让 form 贴顶部显示：上边距设为 0 */
        .form-container { margin: 0 0 30px; }

        .form-container iframe {
        display: block;
        width: 100%;
        border: none;
        max-width: 100%;
        }

        /* event-info */
        .event-info { 
        margin: 12px 0; 
        color: #333; 
        font-size: 20px; 
        line-height: 1.2;
        }

        .event-info p {
        margin: 1px 0;
        }

        /* ✅ 复制按钮布局 */
        .copy-row {
        display: flex;
        gap: 8px;
        justify-content: center;
        align-items: stretch;
        margin: 4px 0 10px;
        }

        .copy-input {
        width: 100%;
        max-width: 420px;
        font-size: 18px;
        padding: 8px;
        text-align: center;
        box-sizing: border-box;
        }

        .copy-btn {
        padding: 8px 12px;
        font-size: 14px;
        border: 1px solid #c9c9c9;
        background: #ffffff;
        border-radius: 6px;
        cursor: pointer;
        white-space: nowrap;
        }

        .copy-btn:hover {
        background: #f2f2f2;
        }

        .copy-btn:active {
        transform: translateY(1px);
        }

        .redirect-btn {
        display: inline-block; margin-top: 20px; padding: 15px 30px;
        background-color: #0078d4; color: white; text-decoration: none; border-radius: 5px;
        font-size: 18px; font-weight: 500;
        }
        .redirect-btn:hover { background-color: #005a9e; }

        .tip { color: #666; margin-top: 30px; font-size: 14px; line-height: 1.5; }

        /* 只针对 #topText 里最后一个 <p>（“Please scroll down...”） */
        #topText > p:last-child {
          margin: 0 0 1px;
        }

        /* ✅ Toast (Copy success) */
        #toast {
        position: fixed;
        left: 50%;
        bottom: 24px;
        transform: translateX(-50%);
        background: rgba(17, 24, 39, 0.92);
        color: #fff;
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 14px;
        line-height: 1.2;
        box-shadow: 0 10px 25px rgba(0,0,0,.18);
        opacity: 0;
        pointer-events: none;
        transition: opacity .18s ease, transform .18s ease;
        z-index: 9999;
        }

        #toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(-6px);
        }
    </style>
</head>
<body>

    <!-- ✅ 让 form 贴顶部：form-container 放在最前面 -->
    <div class="form-container">
        <iframe width="100%" height="600px" 
                src="https://forms.office.com/r/mKG0Lu64FY?origin=lprLink" 
                frameborder="0" marginwidth="0" marginheight="0" 
                style="border: none; max-width:100%;" allowfullscreen>
        </iframe>
    </div>

    <!-- ✅ 原来在 form 上方的所有内容挪到 form 下方 -->
    <div class="content" id="topText">
        <!--
        <h3>Please complete the form below</h3>
        <p class="subtitle">The information you submit is used only for event audience check-in.</p>
        -->

        <div class="event-info">
            <p><strong>Event Code:</strong></p>
            <div class="copy-row">
                <input id="eventCodeInput" value="0001" readonly onclick="this.select()" aria-label="Event Code" class="copy-input">
                <button type="button" class="copy-btn" data-copy-target="eventCodeInput">Copy</button>
            </div>

            <p><strong>URL for M365 Copilot:</strong></p>
            <div class="copy-row">
                <input id="urlInput" value="m365.cloud.microsoft" readonly onclick="this.select()" aria-label="URL for M365 Copilot" class="copy-input">
                <button type="button" class="copy-btn" data-copy-target="urlInput">Copy</button>
            </div>
        </div>

        <p>Please scroll down after submitting.</p>
    </div>

    <div class="content">
        <p>Once you have submitted the form, please click the button below to access your exclusive AI tips and resources.</p>
        <a href="https://www.notion.so/317bd47a65e78036b450ef55595df79e?source=copy_link" target="_blank" class="redirect-btn">
            Access AI Tips and Resources
        </a>

        <p class="tip">If the form fails to load, please visit the original form link: <a href="https://forms.office.com/r/mKG0Lu64FY?origin=lprLink" target="_blank">Click here</a></p>
    </div>

    <!-- ✅ Toast 容器 -->
    <div id="toast" aria-live="polite" aria-atomic="true"></div>

    <script>
    (function () {
      /* ✅ Toast 工具函数 */
      let toastTimer = null;
      function showToast(message) {
        const toast = document.getElementById('toast');
        if (!toast) return;
        toast.textContent = message;
        toast.classList.add('show');

        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
          toast.classList.remove('show');
        }, 1800);
      }

      /* ✅ 复制逻辑 */
      async function copyFromInput(inputId, buttonEl) {
        const input = document.getElementById(inputId);
        if (!input) return;

        const text = input.value;

        try {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(text);
          } else {
            input.focus();
            input.select();
            input.setSelectionRange(0, text.length);
            const ok = document.execCommand('copy');
            if (!ok) throw new Error('execCommand copy failed');
          }

          const old = buttonEl.textContent;
          buttonEl.textContent = 'Copied';
          setTimeout(() => { buttonEl.textContent = old; }, 1200);

          showToast('✅ Copied to clipboard!');
        } catch (err) {
          const old = buttonEl.textContent;
          buttonEl.textContent = 'Copy failed';
          setTimeout(() => { buttonEl.textContent = old; }, 1200);
        }
      }

      /* 绑定所有 Copy 按钮 */
      const copyButtons = document.querySelectorAll('button[data-copy-target]');
      copyButtons.forEach(btn => {
        btn.addEventListener('click', function () {
          copyFromInput(btn.getAttribute('data-copy-target'), btn);
        });
      });
    })();
    </script>
</body>
</html>
