<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Check-In Form</title>
    <style>
        html, body {
        margin: 0;
        padding: 0;
        }

        body { 
        font-family: Arial, sans-serif; 
        text-align: center; 
        }

        .content {
        padding: 20px;
        }

        /* 9.13.2：确保上方文字区域可选中（复制） */
        #topText {
        user-select: text;
        padding-bottom: 0; /* 覆盖 .content 的 padding-bottom */
        }

        /* 1) 缩小标题与下一行文字的间距 */
        h3 { 
        margin: 0 0 8px;   /* 原本浏览器默认会很大，这里改小 */
        line-height: 1.2;
        }

        /* 2) 给标题下那行说明文字一个可控的段落样式 */
        .subtitle {
        margin: 0 0 12px;  /* 控制与下面内容的距离 */
        color: #333;
        line-height: 1.4;
        }

        /* ✅ 让 form 贴顶部显示：上边距设为 0 */
        .form-container { margin: 0 0 30px; }

        .form-container iframe {
        display: block;
        width: 100%;
        border: none;
        max-width: 100%;
        }

        /* 3) event-info 整体间距可再紧一点 */
        .event-info { 
        margin: 12px 0; 
        color: #333; 
        font-size: 20px; 
        line-height: 1.2;  /* 你之前设 1 会偏挤，也可能影响可读性 */
        }

        /* 4) 关键：把 p 的默认上下 margin 压小 */
        .event-info p {
        margin: 1px 0;     /* 你想更紧可用 2px 0 或 0 */
        }

        /* ✅ 复制按钮布局 */
        .copy-row {
        display: flex;
        gap: 8px;
        justify-content: center;
        align-items: stretch;
        margin: 4px 0;
        }

        .copy-input {
        width: 100%;
        max-width: 420px;
        font-size: 18px;
        padding: 8px;
        text-align: center;
        box-sizing: border-box;
        }

        .copy-btn {
        padding: 8px 12px;
        font-size: 14px;
        border: 1px solid #c9c9c9;
        background: #ffffff;
        border-radius: 6px;
        cursor: pointer;
        white-space: nowrap;
        }

        .copy-btn:hover {
        background: #f2f2f2;
        }

        .copy-btn:active {
        transform: translateY(1px);
        }

        .redirect-btn {
        display: inline-block; margin-top: 20px; padding: 15px 30px;
        background-color: #0078d4; color: white; text-decoration: none; border-radius: 5px;
        font-size: 18px; font-weight: 500;
        }
        .redirect-btn:hover { background-color: #005a9e; }

        .tip { color: #666; margin-top: 30px; font-size: 14px; line-height: 1.5; }

        /* 只针对 #topText 里最后一个 <p>（也就是 “Please scroll down...” 那句） */
        #topText > p:last-child {
          margin: 0 0 1px;   /* 下方只留 1px */
        }

        /* ✅ Toast (Copy success) */
        #toast {
        position: fixed;
        left: 50%;
        bottom: 24px;
        transform: translateX(-50%);
        background: rgba(17, 24, 39, 0.92);
        color: #fff;
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 14px;
        line-height: 1.2;
        box-shadow: 0 10px 25px rgba(0,0,0,.18);
        opacity: 0;
        pointer-events: none;
        transition: opacity .18s ease, transform .18s ease;
        z-index: 9999;
        }

        #toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(-6px);
        }
    </style>
</head>
<body>

    <!-- ✅ 1) 让 form 贴顶部：把 form-container 挪到最前面 -->
    <!-- 已嵌入MS Form链接 -->
    <div class="form-container">
        <iframe width="100%" height="600px" 
                src="https://forms.office.com/r/mKG0Lu64FY?origin=lprLink" 
                frameborder="0" marginwidth="0" marginheight="0" 
                style="border: none; max-width:100%;" allowfullscreen>
        </iframe>
    </div>

    <!-- ✅ 2) 原来在 form 上方显示的所有文字，挪到 form 下方 -->
    <div class="content" id="topText">
        <!-- <h3>Please complete the form below</h3>
        <p class="subtitle">The information you submit is used only for event audience check-in.</p> -->

        <div class="event-info">
            <p><strong>Event Code:</strong></p>
            <input value="0001" readonly onclick="this.select()" aria-label="Event Code"
