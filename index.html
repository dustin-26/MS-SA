<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <title>Event Check-In Form</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            width: 100%;
        }

        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            -webkit-tap-highlight-color: transparent;
            -webkit-text-size-adjust: 100%;
        }

        .main-scroll {
            height: 100%;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* 1. 大幅减少内容区域的padding */
        .content {
            padding: 10px 20px 5px; /* 上:10px, 左右:20px, 下:5px */
        }

        #topText {
            user-select: text;
            position: relative;
            z-index: 1;
        }

        .form-container { 
            margin: 0 0 20px; /* 减少表单容器的上下间距 */
            touch-action: manipulation;
        }

        .form-container iframe {
            display: block;
            width: 100%;
            border: none;
            max-width: 100%;
            height: 600px;
        }

        /* 2. 大幅压缩event-info的间距 */
        .event-info { 
            margin: 0; /* 移除默认margin */
            color: #333; 
            font-size: 18px; /* 稍微缩小字体 */
            line-height: 1.1;
        }

        .event-info p {
            margin: 3px 0; /* 极小的段落间距 */
        }

        /* 3. 压缩输入框组的间距 */
        .input-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin: 8px auto; /* 减少上下margin */
            max-width: 520px;
            width: 100%;
        }

        .event-info input {
            -webkit-appearance: none;
            border-radius: 4px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            flex: 1;
            font-size: 16px; /* 缩小输入框字体 */
            padding: 8px; /* 减少输入框内边距 */
            text-align: center;
            transition: border-color 0.2s;
        }

        .event-info input.copied {
            border-color: #107c10;
            background-color: #f0fff0;
        }

        .copy-btn {
            background-color: #0078d4;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 8px 16px; /* 缩小按钮内边距 */
            font-size: 14px; /* 缩小按钮字体 */
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: background-color 0.2s;
        }

        .copy-btn:hover {
            background-color: #005a9e;
        }

        .copy-btn:active {
            background-color: #004578;
        }

        .redirect-btn {
            display: inline-block; margin-top: 15px; padding: 12px 25px; /* 缩小按钮 */
            background-color: #0078d4; color: white; text-decoration: none; border-radius: 5px;
            font-size: 16px; font-weight: 500;
        }
        .redirect-btn:hover { background-color: #005a9e; }

        .tip { color: #666; margin-top: 20px; font-size: 13px; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="main-scroll" id="mainScroll">
        <div class="content" id="topText">
            <div class="event-info">
                <!-- Event Code 输入框+复制按钮 -->
                <p><strong>Event Code:</strong></p>
                <div class="input-group">
                    <input type="text" value="0001" readonly id="eventCodeInput" aria-label="Event Code">
                    <button class="copy-btn" onclick="copyToClipboard('eventCodeInput', this)">Copy</button>
                </div>

                <!-- M365 Copilot URL 输入框+复制按钮 -->
                <p><strong>URL for M365 Copilot:</strong></p>
                <div class="input-group">
                    <input type="text" value="m365.cloud.microsoft" readonly id="copilotUrlInput" aria-label="URL for M365 Copilot">
                    <button class="copy-btn" onclick="copyToClipboard('copilotUrlInput', this)">Copy</button>
                </div>

                <p style="margin-top: 10px; font-size: 14px;">After submitting, please scroll down to access the Bonus AI Resources.</p>
            </div>
        </div>

        <div class="form-container">
            <iframe 
                    src="https://forms.office.com/r/mKG0Lu64FY?origin=lprLink" 
                    frameborder="0" marginwidth="0" marginheight="0" 
                    allowfullscreen>
            </iframe>
        </div>

        <div class="content">
            <p style="margin: 0 0 10px; font-size: 15px;">Please click the button below to access your exclusive AI tips and resources.</p>
            <a href="https://www.notion.so/317bd47a65e78036b450ef55595df79e?source=copy_link" target="_blank" class="redirect-btn">
                Access Bonus AI Resources
            </a>

            <p class="tip">If the form fails to load, please visit the original form link: <a href="https://forms.office.com/r/mKG0Lu64FY?origin=lprLink" target="_blank">Click here</a></p>
        </div>
    </div>

    <script>
    // 复制功能函数
    function copyToClipboard(inputId, button) {
        const input = document.getElementById(inputId);
        const originalValue = input.value;
        const originalPlaceholder = input.placeholder;

        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(originalValue).then(function() {
                showCopySuccess(input, button);
            }).catch(function() {
                fallbackCopy(input, button);
            });
        } else {
            fallbackCopy(input, button);
        }
    }

    function fallbackCopy(input, button) {
        input.select();
        input.setSelectionRange(0, 99999);
        try {
            document.execCommand('copy');
            showCopySuccess(input, button);
        } catch (err) {
            console.error('Failed to copy:', err);
            alert('Failed to copy, please do so manually.');
        }
    }

    function showCopySuccess(input, button) {
        const originalValue = input.value;
        const originalBtnText = button.textContent;

        input.value = 'Copied!';
        input.classList.add('copied');

        button.textContent = 'Copied!';
        button.style.backgroundColor = '#107c10';

        setTimeout(function() {
            input.value = originalValue;
            input.classList.remove('copied');
            button.textContent = originalBtnText;
            button.style.backgroundColor = '';
        }, 1000);
    }

    // 原有滚动控制代码
    (function () {
      const top = document.getElementById('topText');
      const mainScroll = document.getElementById('mainScroll');
      if (!top || !mainScroll) return;

      function isSelectingText() {
        const sel = window.getSelection && window.getSelection();
        return sel && sel.type === 'Range' && String(sel).length > 0;
      }

      top.addEventListener('wheel', function (e) {
        e.preventDefault();
      }, { passive: false });

      top.addEventListener('touchmove', function (e) {
        if (isSelectingText()) return;
        e.preventDefault();
      }, { passive: false });

      const inputs = top.querySelectorAll('input');
      inputs.forEach(function(input) {
        input.addEventListener('focus', function() {
          setTimeout(function() {
            mainScroll.scrollTop = mainScroll.scrollTop;
          }, 100);
        });
      });
    })();
    </script>
</body>
</html>
