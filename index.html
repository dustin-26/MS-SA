<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Check-In Form</title>
    <style>
        html, body {
        margin: 0;
        padding: 0;
        }

        body { 
        font-family: Arial, sans-serif; 
        text-align: center; 
        }

        .content {
        padding: 20px;
        }

        /* 9.13.2：确保上方文字区域可选中（复制） */
        #topText {
        user-select: text;
        }
        
        /* 1) 缩小标题与下一行文字的间距 */
        h3 { 
        margin: 0 0 8px;
        line-height: 1.2;
        }
        
        /* 2) 给标题下那行说明文字一个可控的段落样式 */
        .subtitle {
        margin: 0 0 12px;
        color: #333;
        line-height: 1.4;
        }
        
        .form-container { margin: 1px 0 30px; }

        .form-container iframe {
        display: block;
        width: 100%;
        border: none;
        max-width: 100%;
        }
        
        /* 3) event-info 整体间距可再紧一点 */
        .event-info { 
        margin: 12px 0; 
        color: #333; 
        font-size: 20px; 
        line-height: 1.2;
        }
        
        /* 4) 关键：把 p 的默认上下 margin 压小 */
        .event-info p {
        margin: 1px 0;
        }

        /* ✅ 复制按钮布局 */
        .copy-row {
        display: flex;
        gap: 8px;
        justify-content: center;
        align-items: stretch;
        margin: 4px 0;
        }

        .copy-input {
        width: 100%;
        max-width: 420px;
        font-size: 18px;
        padding: 8px;
        text-align: center;
        box-sizing: border-box;
        }

        .copy-btn {
        padding: 8px 12px;
        font-size: 14px;
        border: 1px solid #c9c9c9;
        background: #ffffff;
        border-radius: 6px;
        cursor: pointer;
        white-space: nowrap;
        }

        .copy-btn:hover {
        background: #f2f2f2;
        }

        .copy-btn:active {
        transform: translateY(1px);
        }
        
        .redirect-btn {
        display: inline-block; margin-top: 20px; padding: 15px 30px;
        background-color: #0078d4; color: white; text-decoration: none; border-radius: 5px;
        font-size: 18px; font-weight: 500;
        }
        .redirect-btn:hover { background-color: #005a9e; }
        
        .tip { color: #666; margin-top: 30px; font-size: 14px; line-height: 1.5; }

        /* ✅ Toast (Copy success) */
        #toast {
        position: fixed;
        left: 50%;
        bottom: 24px;
        transform: translateX(-50%);
        background: rgba(17, 24, 39, 0.92);
        color: #fff;
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 14px;
        line-height: 1.2;
        box-shadow: 0 10px 25px rgba(0,0,0,.18);
        opacity: 0;
        pointer-events: none;
        transition: opacity .18s ease, transform .18s ease;
        z-index: 9999;
        }

        #toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(-6px);
        }

        /* ✅ iOS/Android：父页面滚动锁（键盘弹出时尽量不让父页面被推上去）
           常见做法：position: fixed + top 偏移保存滚动位置。[1](https://learn.microsoft.com/en-us/answers/questions/5420658/how-to-i-set-forms-to-share-outside-my-organizatio)[2](https://stackoverflow.com/questions/25098021/securityerror-blocked-a-frame-with-origin-from-accessing-a-cross-origin-frame) */
        body.lock-scroll {
        position: fixed;
        overflow: hidden;
        width: 100%;
        }
        /* 让上方文字区域底部不额外留 20px 空隙 */
        #topText {
          padding-bottom: 0; /* 覆盖 .content 的 padding-bottom */
        }
        
        /* 只针对 #topText 里最后一个 <p>（也就是 “Please scroll down...” 那句） */
        #topText > p:last-child {
          margin: 0 0 1px;   /* 下方只留 1px */
        }
    </style>
</head>
<body>
    <div class="content" id="topText">
        <!--<h3>Please complete the form below</h3>
        <p class="subtitle">The information you submit is used only for event audience check-in.</p>-->
        
        <div class="event-info">
            <p><strong>Event Code:</strong></p>
            <div class="copy-row">
                <input id="eventCodeInput" value="0001" readonly onclick="this.select()" aria-label="Event Code" class="copy-input">
                <button type="button" class="copy-btn" data-copy-target="eventCodeInput">Copy</button>
            </div>

            <p><strong>URL for M365 Copilot:</strong></p>
            <div class="copy-row">
                <input id="urlInput" value="m365.cloud.microsoft" readonly onclick="this.select()" aria-label="URL for M365 Copilot" class="copy-input">
                <button type="button" class="copy-btn" data-copy-target="urlInput">Copy</button>
            </div>
        </div>

        <p>Please scroll down after submitting.</p>
    </div>

    <!-- 已嵌入MS Form链接 -->
    <div class="form-container">
        <iframe id="msFormFrame" width="100%" height="600px" 
                src="https://forms.office.com/r/mKG0Lu64FY?origin=lprLink" 
                frameborder="0" marginwidth="0" marginheight="0" 
                style="border: none; max-width:100%;" allowfullscreen>
        </iframe>
    </div>

    <div class="content">
        <p>Once you have submitted the form, please click the button below to access your exclusive AI tips and resources.</p>
        <!-- 已嵌入Notion跳转链接 -->
        <a href="https://www.notion.so/317bd47a65e78036b450ef55595df79e?source=copy_link" target="_blank" class="redirect-btn">
            Access AI Tips and Resources
        </a>

        <p class="tip">If the form fails to load, please visit the original form link: <a href="https://forms.office.com/r/mKG0Lu64FY?origin=lprLink" target="_blank">Click here</a></p>
    </div>

    <!-- ✅ Toast 容器 -->
    <div id="toast" aria-live="polite" aria-atomic="true"></div>

    <script>
    (function () {
      const top = document.getElementById('topText');
      if (!top) return;

      const frame = document.getElementById('msFormFrame');

      function isSelectingText() {
        const sel = window.getSelection && window.getSelection();
        return sel && sel.type === 'Range' && String(sel).length > 0;
      }

      // 桌面：鼠标滚轮（不影响拖选复制）
      top.addEventListener('wheel', function (e) {
        e.preventDefault();
      }, { passive: false });

      // 手机：只在“未进行文字选择”时阻止滚动（不影响复制选区手柄）
      top.addEventListener('touchmove', function (e) {
        if (isSelectingText()) return;
        e.preventDefault();
      }, { passive: false });

      /* ✅ Toast 工具函数 */
      let toastTimer = null;
      function showToast(message) {
        const toast = document.getElementById('toast');
        if (!toast) return;
        toast.textContent = message;
        toast.classList.add('show');

        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
          toast.classList.remove('show');
        }, 1800);
      }

      /* ✅ 复制逻辑：优先 Clipboard API（HTTPS 安全上下文），回退 async function copyFromInput(inputId, buttonEl) {
        const input = document.getElementById(inputId);
        if (!input) return;

        const text = input.value;

        try {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(text);
          } else {
            input.focus();
            input.select();
            input.setSelectionRange(0, text.length);
            const ok = document.execCommand('copy');
            if (!ok) throw new Error('execCommand copy failed');
          }

          const old = buttonEl.textContent;
          buttonEl.textContent = 'Copied';
          setTimeout(() => { buttonEl.textContent = old; }, 1200);

          showToast('✅ Copied to clipboard!');
        } catch (err) {
          const old = buttonEl.textContent;
          buttonEl.textContent = 'Copy failed';
          setTimeout(() => { buttonEl.textContent = old; }, 1500);
          // showToast('⚠️ Copy failed. Please copy manually.');
        }
      }

      const copyButtons = document.querySelectorAll('button[data-copy-target]');
      copyButtons.forEach(btn => {
        btn.addEventListener('click', function () {
          copyFromInput(btn.getAttribute('data-copy-target'), btn);
        });
      });

      /* ✅ 关键：iOS 键盘弹出导致父页面被自动推上去（你确认是 B：iframe 内输入）
         工程解法：当检测到键盘出现时，锁住父页面滚动（position:fixed + top 偏移）。
         许多 iOS 键盘/viewport 问题需要 JS workaround，且 VisualViewport 常被用作可靠信号。[2](https://stackoverflow.com/questions/25098021/securityerror-blocked-a-frame-with-origin-from-accessing-a-cross-origin-frame)[3](https://www.techbloat.com/4-methods-to-share-microsoft-forms-with-external-users.html) */

      let savedScrollY = 0;
      let locked = false;

      function lockBodyScroll() {
        if (locked) return;
        savedScrollY = window.scrollY || document.documentElement.scrollTop || 0;
        document.body.classList.add('lock-scroll');
        document.body.style.top = `-${savedScrollY}px`;
        locked = true;
      }

      function unlockBodyScroll() {
        if (!locked) return;
        document.body.classList.remove('lock-scroll');
        document.body.style.top = '';
        window.scrollTo(0, savedScrollY);
        locked = false;
      }

      // 1) 只要用户开始与 iframe 交互，就先锁一次（键盘弹出前的预防）
      if (frame) {
        frame.addEventListener('pointerdown', lockBodyScroll, { passive: true });
        frame.addEventListener('touchstart', lockBodyScroll, { passive: true });
      }

      // 2) 用 VisualViewport 识别键盘出现/消失（iOS 常见做法）
      let baseVVH = null;        // 基准可视高度
      let keyboardOpen = false;  // 键盘状态推断

      function setBaseVVH() {
        if (!window.visualViewport) return;
        baseVVH = window.visualViewport.height;
      }

      if (window.visualViewport) {
        setBaseVVH();

        const onVVChange = () => {
          const vv = window.visualViewport;
          if (!vv || baseVVH == null) return;

          const current = vv.height;
          const delta = baseVVH - current;

          // 键盘出现：可视高度明显变小（阈值 120px 可按机型微调）
          if (delta > 120) {
            keyboardOpen = true;
            lockBodyScroll();
            return;
          }

          // 键盘收起：高度恢复接近基准
          if (keyboardOpen && Math.abs(delta) < 60) {
            keyboardOpen = false;
            unlockBodyScroll();

            // 收起后更新基准（地址栏/工具栏变化会影响基准高度）
            setTimeout(setBaseVVH, 200);
          }
        };

        window.visualViewport.addEventListener('resize', onVVChange);
        window.visualViewport.addEventListener('scroll', onVVChange);

        // 设备旋转/尺寸变化：刷新基准
        window.addEventListener('orientationchange', () => {
          setTimeout(() => {
            unlockBodyScroll();
            keyboardOpen = false;
            setBaseVVH();
          }, 300);
        });
      }

      // 3) 用户点到 iframe 外（且键盘已收起）时确保解锁（避免“锁死”）
      document.addEventListener('pointerdown', (e) => {
        if (!frame) return;
        if (!frame.contains(e.target) && !keyboardOpen) {
          unlockBodyScroll();
        }
      }, { passive: true });

    })();
    </script>
</body>
</html>
