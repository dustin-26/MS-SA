<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Check-In Form</title>
  <style>
    html, body { margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; text-align: center; }
    .content { padding: 20px; }

    /* 允许选中复制 */
    #topText { user-select: text; }

    .form-container { margin: 1px 0 30px; }
    .form-container iframe {
      display: block;
      width: 100%;
      border: none;
      max-width: 100%;
    }

    .event-info { margin: 12px 0; color: #333; font-size: 20px; line-height: 1.2; }
    .event-info p { margin: 1px 0; }

    /* 复制布局 */
    .copy-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      align-items: stretch;
      margin: 4px 0;
    }
    .copy-input {
      width: 100%;
      max-width: 420px;
      font-size: 18px;
      padding: 8px;
      text-align: center;
      box-sizing: border-box;
    }
    .copy-btn {
      padding: 8px 12px;
      font-size: 14px;
      border: 1px solid #c9c9c9;
      background: #fff;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
    }
    .copy-btn:hover { background: #f2f2f2; }
    .copy-btn:active { transform: translateY(1px); }

    .redirect-btn {
      display: inline-block; margin-top: 20px; padding: 15px 30px;
      background-color: #0078d4; color: white; text-decoration: none; border-radius: 5px;
      font-size: 18px; font-weight: 500;
    }
    .redirect-btn:hover { background-color: #005a9e; }
    .tip { color: #666; margin-top: 30px; font-size: 14px; line-height: 1.5; }

    /* Toast */
    #toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      background: rgba(17, 24, 39, 0.92);
      color: #fff;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.2;
      box-shadow: 0 10px 25px rgba(0,0,0,.18);
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
      z-index: 9999;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-6px);
    }

    /* ✅ 更硬的锁滚：同时锁 html + body，避免 iOS 把滚动根当 html 导致漏锁 [2](https://www.reddit.com/r/Office365/comments/17bscay/microsoft_forms_cannot_collaborate_outside_of_org/) */
    html.lock-scroll, body.lock-scroll {
      overflow: hidden;
    }
    body.lock-scroll {
      position: fixed;
      width: 100%;
    }
  </style>
</head>

<body>
  <div class="content" id="topText">
    <div class="event-info">
      <p><strong>Event Code:</strong></p>
      <div class="copy-row">
        <input id="eventCodeInput" value="0001" readonly onclick="this.select()" aria-label="Event Code" class="copy-input">
        <button type="button" class="copy-btn" data-copy-target="eventCodeInput">Copy</button>
      </div>

      <p><strong>URL for M365 Copilot:</strong></p>
      <div class="copy-row">
        <input id="urlInput" value="m365.cloud.microsoft" readonly onclick="this.select()" aria-label="URL for M365 Copilot" class="copy-input">
        <button type="button" class="copy-btn" data-copy-target="urlInput">Copy</button>
      </div>
    </div>

    <p>Please scroll down after submitting.</p>
  </div>

  <!-- MS Form iframe：必须有 id="msFormFrame" -->
  <div class="form-container">
    <iframe id="msFormFrame" width="100%" height="600px"
      src="https://forms.office.com/r/mKG0Lu64FY?origin=lprLink"
      frameborder="0" marginwidth="0" marginheight="0"
      style="border:none;max-width:100%;" allowfullscreen>
    </iframe>
  </div>

  <div class="content">
    <p>Once you have submitted the form, please click the button below to access your exclusive AI tips and resources.</p>
    <a href="https://www.notion.so/317bd47a65e78036b450ef55595df79e?source=copy_link" target="_blank" class="redirect-btn">
      Access AI Tips and Resources
    </a>

    <p class="tip">If the form fails to load, please visit the original form link:
      <a href="https://forms.office.com/r/mKG0Lu64FY?origin=lprLink" target="_blank">Click here</a>
    </p>
  </div>

  <div id="toast" aria-live="polite" aria-atomic="true"></div>

  <script>
  (function () {
    const top = document.getElementById('topText');
    const frame = document.getElementById('msFormFrame');

    /* ---------- Toast ---------- */
    let toastTimer = null;
    function showToast(message) {
      const toast = document.getElementById('toast');
      if (!toast) return;
      toast.textContent = message;
      toast.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
    }

    /* ---------- Copy ---------- */
    async function copyFromInput(inputId, buttonEl) {
      const input = document.getElementById(inputId);
      if (!input) return;
      const text = input.value;

      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(text);
        } else {
          input.focus();
          input.select();
          input.setSelectionRange(0, text.length);
          const ok = document.execCommand('copy');
          if (!ok) throw new Error('execCommand copy failed');
        }

        const old = buttonEl.textContent;
        buttonEl.textContent = 'Copied';
        setTimeout(() => { buttonEl.textContent = old; }, 1200);

        showToast('✅ Copied to clipboard!');
      } catch (err) {
        const old = buttonEl.textContent;
        buttonEl.textContent = 'Copy failed';
        setTimeout(() => { buttonEl.textContent = old; }, 1500);
      }
    }

    document.querySelectorAll('button[data-copy-target]').forEach(btn => {
      btn.addEventListener('click', function () {
        copyFromInput(btn.getAttribute('data-copy-target'), btn);
      });
    });

    /* ---------- Top text: block scroll but keep selection ---------- */
    function isSelectingText() {
      const sel = window.getSelection && window.getSelection();
      return sel && sel.type === 'Range' && String(sel).length > 0;
    }

    if (top) {
      top.addEventListener('wheel', function (e) {
        e.preventDefault();
      }, { passive: false });

      top.addEventListener('touchmove', function (e) {
        if (isSelectingText()) return;
        e.preventDefault();
      }, { passive: false });
    }

    /* =========================================================
       ✅ iOS keyboard pushes parent page: HARD LOCK + VisualViewport polling
       - iOS 可能把滚动根当 html；因此锁 html+body [2](https://www.reddit.com/r/Office365/comments/17bscay/microsoft_forms_cannot_collaborate_outside_of_org/)
       - preventDefault 需 passive:false 才会在 iOS 生效 [4](https://fastnow.github.io/getcode.html)[5](https://cloud.tencent.com/developer/article/2485525)
       - VisualViewport 描述视觉视口 height/offsetTop [3](https://fmennen.de/post/accessing-cross-domain-iframe-content-with-java-script)
    ========================================================= */

    let locked = false;
    let savedScrollY = 0;

    function lockParent() {
      if (locked) return;
      savedScrollY = window.scrollY || document.documentElement.scrollTop || 0;
      document.documentElement.classList.add('lock-scroll');
      document.body.classList.add('lock-scroll');
      document.body.style.top = `-${savedScrollY}px`;
      locked = true;
    }

    function unlockParent() {
      if (!locked) return;
      document.documentElement.classList.remove('lock-scroll');
      document.body.classList.remove('lock-scroll');
      document.body.style.top = '';
      window.scrollTo(0, savedScrollY);
      locked = false;
    }

    // ✅ 锁定时，阻止父页面 touchmove（iframe 内 touch 不会冒泡到父页面，不影响表单滚动）
    document.addEventListener('touchmove', function (e) {
      if (locked) e.preventDefault();
    }, { passive: false }); // passive:false 才能 preventDefault 生效 [4](https://fastnow.github.io/getcode.html)[5](https://cloud.tencent.com/developer/article/2485525)

    // 用于判断“用户正在与表单交互”（跨域无法知道 focus，只能用触碰 iframe 近似）
    let inFormInteraction = false;
    let interactionTimer = null;
    function markFormInteraction() {
      inFormInteraction = true;
      if (interactionTimer) clearTimeout(interactionTimer);
      interactionTimer = setTimeout(() => { inFormInteraction = false; }, 8000);
    }

    if (frame) {
      // iOS 上 pointerdown 有时不稳定，所以两种都绑
      frame.addEventListener('touchstart', () => { markFormInteraction(); lockParent(); }, { passive: true });
      frame.addEventListener('pointerdown', () => { markFormInteraction(); lockParent(); }, { passive: true });
    }

    // VisualViewport 轮询检测键盘（比只靠 resize 更稳）
    const vv = window.visualViewport;
    let maxVVH = vv ? vv.height : null;

    function keyboardLikelyOpen() {
      if (!vv) return false;
      maxVVH = Math.max(maxVVH || vv.height, vv.height);
      const heightDelta = (maxVVH || vv.height) - vv.height;
      const offsetTop = vv.offsetTop || 0;
      // 阈值：iOS/Android 通用。heightDelta/offsetTop 任一明显变化都认为键盘在
      return (heightDelta > 80) || (offsetTop > 30);
    }

    // 轮询：只要在表单交互中或已锁定，就持续检测
    setInterval(() => {
      if (!vv) return;

      const shouldWatch = inFormInteraction || locked;
      if (!shouldWatch) return;

      const kb = keyboardLikelyOpen();
      if (kb) {
        lockParent();
      } else {
        // 键盘收起后解锁（给 iOS 一点点缓冲）
        setTimeout(() => {
          if (!keyboardLikelyOpen()) unlockParent();
        }, 120);
      }
    }, 150);

    // 用户点到 iframe 外且键盘不在时，解锁（避免卡死）
    document.addEventListener('pointerdown', (e) => {
      if (!frame) return;
      if (!frame.contains(e.target) && !keyboardLikelyOpen()) {
        unlockParent();
      }
    }, { passive: true });
  })();
  </script>
</body>
</html>
